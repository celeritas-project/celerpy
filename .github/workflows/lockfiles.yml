name: Update Dependencies and Push to Github

on:
  # Allow API to be hit to trigger workflow.
  workflow_dispatch:

  # Every Monday at 1PM UTC (7AM EST)
  #  schedule:
  #    - cron: "0 11 * * 1"

jobs:
  push-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install Poetry
        run: pip install poetry

      - name: Update Lockfile
        run: poetry update

      - name: Open PR with updated lockfile
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update poetry.lock"
          branch: chore/update-lockfile
          title: "Update poetry.lock"
          body: "Automated dependency update via `poetry update`."
          delete-branch: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
