name: PyPI

on:
  workflow_dispatch:
  workflow_call:

jobs:
  publish:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags')}}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: ./.github/actions/setup-repo
      - name: Install Dependencies
        run: poetry install
      - name: Build Wheel
        run: make build
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1

