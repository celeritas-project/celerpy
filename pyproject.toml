[build-system]
build-backend = "poetry.core.masonry.api"
requires = ["poetry-core"]

[tool.mypy]
plugins = [
  "pydantic.mypy"
]

[tool.poetry]
authors = ["Seth R. Johnson et al."]
description = ""
license = "Apache-2.0"
name = "celerpy"
packages = [{include = "celerpy"}]
readme = "README.md"
version = "0.1.0"

[tool.poetry.dependencies]
matplotlib = ">=3.7"
numpy = ">=1.20"
pydantic = ">=2.0,<3.0"
pydantic-settings = ">=2.0,<3.0"
python = ">=3.11,<4.0"
typer = "*"

[tool.poetry.group.dev.dependencies]
dapperdata = "0.4.0"
glom = "24.11.0"
mypy = "1.18.2"
pre-commit = "4.3.0"
pytest = "8.4.2"
pytest-cov = "7.0.0"
pytest-pretty = "1.3.0"
"ruamel.yaml" = "0.18.15"
ruff = "0.13.3"
toml-sort = "0.24.3"

[tool.poetry.scripts]
celerpy = "celerpy.cli:app"

[tool.ruff]
exclude = [".venv"]
line-length = 80
indent-width = 4

[tool.ruff.lint]
select = [
  # pycodestyle
  "E",
  # Pyflakes
  "F",
  # pyupgrade
  "UP",
  # flake8-bugbear
  "B",
  # flake8-simplify
  "SIM",
  # isort
  "I"
]
